version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms-api
    ports:
      - "3000:3000"
    environment:
      - Redis__Connection=redis:6379,ssl=False,abortConnect=False
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Google__RedirectUri=${GOOGLE_REDIRECT_URI:-https://api.wms.vn/v1/auth/google/callback}
      - Google__FrontendCallbackUrl=${GOOGLE_FRONTEND_URL:-https://wms.vn/auth/callback}
      - Facebook__AppId=${FB_APP_ID}
      - Facebook__AppSecret=${FB_APP_SECRET}
      - Facebook__RedirectUri=${FB_REDIRECT_URI:-https://api.wms.vn/v1/auth/facebook/callback}
      - Facebook__FrontendCallbackUrl=${FB_FRONTEND_URL:-https://wms.vn/auth/callback}
      - X__ClientId=${X_CLIENT_ID}
      - X__ClientSecret=${X_CLIENT_SECRET}
      - X__RedirectUri=${X_REDIRECT_URI:-https://api.wms.vn/v1/auth/x/callback}
      - X__FrontendCallbackUrl=${X_FRONTEND_URL:-https://wms.vn/auth/callback}
      - Microsoft__ClientId=${MS_CLIENT_ID}
      - Microsoft__ClientSecret=${MS_CLIENT_SECRET}
      - Microsoft__Tenant=${MS_TENANT:-common}
      - Microsoft__RedirectUri=${MS_REDIRECT_URI:-https://api.wms.vn/v1/auth/microsoft/callback}
      - Microsoft__FrontendCallbackUrl=${MS_FRONTEND_URL:-https://wms.vn/auth/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wms-redis
    command: redis-server --requirepass ${REDIS_PASS} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: wms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

  